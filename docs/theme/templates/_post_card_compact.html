<article class="post-card-compact{% if not post.image %} post-card-compact-no-image{% endif %}">
  {% if post.image %}
  <img src="{{ post.image }}" alt="" class="post-card-compact-image">
  {% endif %}
  <div class="post-card-compact-content">
    <div class="post-card-compact-meta">
      {% for tag in post.tags %}
      <a href="/tags/{{ tag.slug }}/" class="tag-badge">{{ tag.name }}</a>
      {% endfor %}
      {% if post.created %}<span class="post-card-compact-date">{{ post.created }}</span>{% endif %}
    </div>
    <h3 class="post-card-compact-title"><a href="{{ post.url }}" class="post-card-link">{{ post.title }}</a></h3>
    {% if post.description %}<p class="post-card-compact-excerpt">{{ post.description }}</p>{% endif %}
  </div>
</article>
