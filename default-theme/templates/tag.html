{% extends "base.html" %}

{% block page_title %}Posts tagged #{{ tag }}{% endblock page_title %}

{% block content %}
<h1>Posts tagged #{{ tag }}</h1>
<ul class="blog-list">
    {% for post in posts %}
    <li>
        <a href="{{ post.url | safe }}">{{ post.title }}</a>
        {% if post.created %}<time>{{ post.created }}</time>{% endif %}
    </li>
    {% endfor %}
</ul>
{% endblock content %}
